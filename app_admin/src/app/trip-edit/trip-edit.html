<div class="container mt-4">
  <h2>Edit Trip</h2>

  <form>
    <div class="mb-3">
      <label class="form-label">Code</label>
      <input class="form-control" value="SUN999">
    </div>

    <div class="mb-3">
      <label class="form-label">Name</label>
      <input class="form-control" value="Sunset Escape">
    </div>

    <div class="mb-3">
      <label class="form-label">Length</label>
      <input class="form-control" value="4 nights / 5 days">
    </div>

    <div class="mb-3">
      <label class="form-label">Start</label>
      <input class="form-control" value="2026-09-12">
    </div>

    <div class="mb-3">
      <label class="form-label">Resort</label>
      <input class="form-control" value="Sunset Bay Resort">
    </div>

    <div class="mb-3">
      <label class="form-label">Price</label>
      <input class="form-control" value="$1,299">
    </div>

    <div class="mb-3">
      <label class="form-label">Image</label>
      <input class="form-control" value="sunset-escape.jpg">
    </div>

    <div class="mb-3">
      <label class="form-label">Description</label>
      <textarea class="form-control" rows="4">A relaxing beach trip with sunset views and resort activities.</textarea>
    </div>

    <button type="button" class="btn btn-primary">Save</button>
  </form>
</div>
